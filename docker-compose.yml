# Docker Compose stack for voice_rag_agents (local-first).
#
# Services: API + Milvus (+ deps) + Ollama + Open WebUI.
# The product is testable WITHOUT this stack (mock profile); compose is for
# local integration / real-provider runs.
#
# Validate without starting: `docker compose config`
# Start: `docker compose up -d`

services:
  voice-rag-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: voice-rag-agents:local
    environment:
      VOICE_RAG_PROFILE: ${VOICE_RAG_PROFILE:-local}
      VOICE_RAG_MILVUS_URI: http://milvus-standalone:19530
      VOICE_RAG_LLM_BASE_URL: http://ollama:11434/v1
      VOICE_RAG_EMBEDDING_BASE_URL: http://ollama:11434
      VOICE_RAG_EMBEDDING_MODEL: nomic-embed-text
      VOICE_RAG_EMBEDDING_API_KEY: ""
      VOICE_RAG_EMBEDDING_DIM: "768"
      VOICE_RAG_API_HOST: 0.0.0.0
      VOICE_RAG_API_PORT: "8088"
    ports:
      - "8088:8088"
    depends_on:
      - milvus-standalone
      - ollama
    restart: unless-stopped

  milvus-standalone:
    image: milvusdb/milvus:v2.4.4
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_USE_EMBED: "true"
      COMMON_STORAGETYPE: local
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OPENAI_API_BASE_URLS: http://voice-rag-api:8088
      OPENAI_API_KEYS: ""
      ENABLE_OPENAI_API: "true"
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-changeme32charssecretkey1234567890ab}
    ports:
      - "3000:8080"
    depends_on:
      - voice-rag-api
    volumes:
      - open_webui_data:/app/backend/data
    restart: unless-stopped

volumes:
  milvus_data:
  ollama_data:
  open_webui_data:
